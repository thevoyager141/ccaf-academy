<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CCA-F ACADEMY — V2 학습 코스</title>
<script>document.documentElement.dataset.theme = localStorage.getItem("ccaf_theme") || "dark";</script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
  [data-theme="dark"]{
    --bg:#171614; --surface:#1f1e1b; --surface2:#292722; --line:#35322b;
    --text:#f0efeb; --muted:#9a968b; --dim:#615e54;
    --accent:#d97757; --accent-soft:rgba(217,119,87,.13); --accent-line:rgba(217,119,87,.32);
    --on-accent:#1b1512;
    --ok:#66b883; --ok-soft:rgba(102,184,131,.11); --ok-line:rgba(102,184,131,.35);
    --no:#e0655f; --no-soft:rgba(224,101,95,.11); --no-line:rgba(224,101,95,.35);
    --warn:#d9a957; --warn-soft:rgba(217,169,87,.11); --warn-line:rgba(217,169,87,.35);
    --header:rgba(23,22,20,.86); --code-bg:#2b2823; --code-tx:#f0b9a4;
  }
  [data-theme="light"]{
    --bg:#faf9f5; --surface:#ffffff; --surface2:#f0eee6; --line:#e4e1d5;
    --text:#232019; --muted:#716d60; --dim:#aaa699;
    --accent:#c96442; --accent-soft:rgba(201,100,66,.09); --accent-line:rgba(201,100,66,.3);
    --on-accent:#ffffff;
    --ok:#3f8f5a; --ok-soft:rgba(63,143,90,.09); --ok-line:rgba(63,143,90,.3);
    --no:#c4443f; --no-soft:rgba(196,68,63,.08); --no-line:rgba(196,68,63,.3);
    --warn:#a97f2a; --warn-soft:rgba(169,127,42,.09); --warn-line:rgba(169,127,42,.3);
    --header:rgba(250,249,245,.88); --code-bg:#f0e9df; --code-tx:#a4502f;
  }
  :root{ --radius:14px }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:"Pretendard Variable",Pretendard,-apple-system,system-ui,sans-serif;line-height:1.6;-webkit-font-smoothing:antialiased;transition:background .25s,color .25s}
  ::selection{background:var(--accent);color:#fff}
  .eyebrow{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);font-weight:700}
  .muted{color:var(--muted)}

  header{position:sticky;top:0;z-index:50;background:var(--header);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
  .hwrap{max-width:1080px;margin:0 auto;padding:0 24px;height:60px;display:flex;align-items:center;gap:20px}
  .logo{font-weight:800;letter-spacing:.06em;font-size:15px;cursor:pointer;white-space:nowrap}
  .logo em{color:var(--accent);font-style:normal}
  nav{display:flex;gap:4px;flex:1}
  nav button{background:none;border:0;color:var(--muted);font:inherit;font-size:13.5px;font-weight:600;padding:7px 12px;border-radius:8px;cursor:pointer;transition:.15s}
  nav button:hover{color:var(--text)}
  nav button.on{color:var(--text);background:var(--surface2)}
  .hright{display:flex;align-items:center;gap:10px}
  .theme-btn{background:var(--surface2);border:1px solid var(--line);border-radius:99px;width:34px;height:34px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:.15s}
  .theme-btn:hover{border-color:var(--dim)}
  .dday{font-size:12.5px;font-weight:700;color:var(--accent);background:var(--accent-soft);border:1px solid var(--accent-line);padding:5px 12px;border-radius:99px;white-space:nowrap}

  .wrap{max-width:1080px;margin:0 auto;padding:0 24px}
  .hero{padding:56px 0 40px}
  .hero h1{font-size:clamp(26px,4.2vw,42px);font-weight:800;letter-spacing:-.02em;line-height:1.28;margin:14px 0 16px}
  .hero h1 .ac{color:var(--accent)}
  .hero p{max-width:620px;color:var(--muted);font-size:15px}
  .hero .cta{margin-top:26px;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  .btn{border:0;font:inherit;font-weight:700;cursor:pointer;border-radius:10px;transition:.15s}
  .btn-primary{background:var(--accent);color:var(--on-accent);padding:13px 26px;font-size:15px}
  .btn-primary:hover{filter:brightness(1.06)}
  .btn-primary:disabled{opacity:.35;cursor:default}
  .btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--line);padding:12px 20px;font-size:14px}
  .btn-ghost:hover{color:var(--text);border-color:var(--dim)}
  .btn-ghost:disabled{opacity:.35;cursor:default}

  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin:8px 0 48px}
  .stat{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px}
  .stat .k{font-size:12px;color:var(--muted);margin-bottom:6px}
  .stat .v{font-size:22px;font-weight:800;letter-spacing:-.01em}
  .stat .v small{font-size:13px;color:var(--muted);font-weight:600;margin-left:4px}

  .sec{margin-bottom:56px}
  .sec-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:8px}
  .sec-head h2{font-size:22px;font-weight:800;letter-spacing:-.01em;margin-top:6px}
  .parts{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
  .part{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:22px;cursor:pointer;transition:.18s}
  .part:hover{border-color:var(--dim);transform:translateY(-2px)}
  .part.locked{opacity:.55}
  .part .num{font-size:12px;font-weight:800;color:var(--dim);letter-spacing:.14em}
  .part .en{font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);font-weight:700;margin-top:14px}
  .part h3{font-size:17px;font-weight:750;margin:6px 0 10px;letter-spacing:-.01em}
  .part .meta{font-size:12.5px;color:var(--muted);display:flex;gap:10px;flex-wrap:wrap}
  .part .meta b{color:var(--text);font-weight:700}
  .badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:99px;border:1px solid var(--line);color:var(--muted)}
  .badge.weak{color:var(--no);border-color:var(--no-line);background:var(--no-soft)}
  .badge.strong{color:var(--ok);border-color:var(--ok-line);background:var(--ok-soft)}
  .pbar{height:4px;background:var(--surface2);border-radius:99px;margin-top:16px;overflow:hidden}
  .pbar i{display:block;height:100%;background:var(--accent);border-radius:99px;transition:width .4s}
  .part .top{display:flex;justify-content:space-between;align-items:flex-start}

  /* part page */
  .ppage{max-width:760px;margin:0 auto;padding:40px 24px 80px}
  .ppage .phead{margin-bottom:28px}
  .ppage h1{font-size:26px;font-weight:800;letter-spacing:-.015em;margin:8px 0 10px}
  .ppage .pdesc{color:var(--muted);font-size:14.5px}
  .crumb{background:none;border:0;color:var(--muted);cursor:pointer;font:inherit;font-size:13px;padding:0;margin-bottom:14px}
  .crumb:hover{color:var(--text)}
  .lrow{display:flex;align-items:center;gap:14px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin-bottom:10px;cursor:pointer;transition:.15s}
  .lrow:hover{border-color:var(--dim)}
  .lrow .st{width:26px;height:26px;border-radius:99px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0;border:1.5px solid var(--line);color:var(--dim)}
  .lrow .st.done{background:var(--ok-soft);border-color:var(--ok-line);color:var(--ok)}
  .lrow .st.now{background:var(--accent-soft);border-color:var(--accent-line);color:var(--accent)}
  .lrow .li{flex:1;min-width:0}
  .lrow .lt{font-size:14.5px;font-weight:700}
  .lrow .ls{font-size:12px;color:var(--muted)}
  .lrow .lr{font-size:12px;color:var(--muted);white-space:nowrap}
  .lrow.test{border-style:dashed}

  /* lesson */
  .lesson-top{border-bottom:1px solid var(--line);background:var(--surface)}
  .lt-wrap{max-width:720px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;gap:16px}
  .lt-wrap .back{background:none;border:0;color:var(--muted);cursor:pointer;font-size:20px;line-height:1}
  .lt-wrap .info{flex:1;min-width:0}
  .lt-wrap .info .t{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .lt-wrap .info .s{font-size:11.5px;color:var(--muted)}
  .segs{display:flex;gap:5px;width:160px}
  .segs i{flex:1;height:4px;border-radius:99px;background:var(--surface2)}
  .segs i.done{background:var(--accent)}
  .segs i.now{background:var(--text)}

  .stage{max-width:720px;margin:0 auto;padding:44px 24px 150px}
  .step{animation:fadein .3s ease}
  @keyframes fadein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .step .kind{margin-bottom:16px}
  .step h2{font-size:24px;font-weight:800;letter-spacing:-.015em;line-height:1.35;margin-bottom:18px}
  .prose{font-size:15.5px;color:var(--text)}
  .prose p{margin-bottom:13px}
  .prose .lead{color:var(--muted)}
  .prose ul{list-style:none;margin:0 0 16px}
  .prose li{padding-left:20px;position:relative;margin-bottom:9px}
  .prose li::before{content:"•";position:absolute;left:4px;color:var(--accent);font-weight:800}
  .prose li ul{margin:8px 0 0}
  .prose li li::before{content:"–";color:var(--dim)}
  .prose h4{font-size:13px;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;margin:20px 0 10px;font-weight:800}
  .prose code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:.87em;background:var(--code-bg);border:1px solid var(--line);padding:2px 7px;border-radius:6px;color:var(--code-tx)}
  .prose table{width:100%;border-collapse:collapse;margin:14px 0;font-size:13.5px}
  .prose th,.prose td{border:1px solid var(--line);padding:8px 12px;text-align:left}
  .prose th{background:var(--surface2);font-size:12px;color:var(--muted)}
  .callout{background:var(--surface);border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:10px;padding:13px 17px;font-size:14px;margin:18px 0;color:var(--text)}
  /* 아키텍처 지도 */
  .amap{border:1px dashed var(--line);border-radius:12px;padding:16px;margin:4px 0 22px;background:var(--surface)}
  .amap .amt{font-size:10.5px;letter-spacing:.14em;color:var(--muted);text-transform:uppercase;font-weight:800;margin-bottom:12px}
  .amap .arow{display:flex;align-items:stretch;gap:6px;flex-wrap:wrap;margin-bottom:8px}
  .amap .ab{border:1px solid var(--line);border-radius:8px;padding:6px 10px;font-size:11.5px;color:var(--muted);background:var(--surface2);display:flex;flex-direction:column;justify-content:center;text-align:center}
  .amap .aarr{align-self:center;color:var(--dim);font-size:12px;padding:0 2px}
  .amap .on{border-color:var(--accent) !important;background:var(--accent-soft) !important;color:var(--accent) !important;font-weight:700;box-shadow:0 0 0 1px var(--accent-line)}
  .amap .coord{flex:1;min-width:170px}
  .amap .inrow{display:flex;gap:6px;margin-top:6px;justify-content:center;flex-wrap:wrap}
  .amap .abi{border:1px solid var(--line);border-radius:6px;padding:3px 8px;font-size:10.5px;color:var(--muted);background:var(--bg)}
  .loopdia{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:20px 0;justify-content:center}
  .loopdia .nd{background:var(--surface2);border:1px solid var(--line);border-radius:10px;padding:10px 14px;font-size:13px;font-weight:600;text-align:center}
  .loopdia .nd small{display:block;font-size:10.5px;color:var(--muted);font-weight:500}
  .loopdia .ar{color:var(--dim);font-size:15px}
  .loopdia .nd.hot{border-color:var(--accent-line);background:var(--accent-soft)}

  .opts{display:flex;flex-direction:column;gap:10px;margin-top:24px}
  .opt{background:var(--surface);border:1.5px solid var(--line);border-radius:12px;padding:15px 18px;font-size:15px;text-align:left;color:var(--text);cursor:pointer;font:inherit;display:flex;gap:12px;transition:.15s}
  .opt:hover:not(:disabled){border-color:var(--dim)}
  .opt .abc{font-weight:800;color:var(--muted);flex-shrink:0}
  .opt.sel{border-color:var(--accent)}
  .opt.right{border-color:var(--ok);background:var(--ok-soft)}
  .opt.wrong{border-color:var(--no);background:var(--no-soft);opacity:.85}
  .opt:disabled{cursor:default}

  .fb{border-radius:12px;padding:16px 20px;margin-top:18px;font-size:14.5px;animation:fadein .25s ease}
  .fb.hint{background:var(--warn-soft);border:1px solid var(--warn-line)}
  .fb.good{background:var(--ok-soft);border:1px solid var(--ok-line)}
  .fb.bad{background:var(--no-soft);border:1px solid var(--no-line)}
  .fb .fb-t{font-weight:800;font-size:13px;letter-spacing:.06em;margin-bottom:8px}
  .fb.hint .fb-t{color:var(--warn)} .fb.good .fb-t{color:var(--ok)} .fb.bad .fb-t{color:var(--no)}
  .fb ul{margin:10px 0 0;list-style:none}
  .fb li{margin-bottom:8px;padding-left:22px;position:relative}
  .fb li::before{content:"✕";position:absolute;left:0;color:var(--no);font-weight:800;font-size:12px;top:2px}
  .fb li b{color:var(--text)}
  .chip{display:inline-block;margin-top:14px;font-size:11.5px;font-weight:700;color:var(--accent);background:var(--accent-soft);border:1px solid var(--accent-line);padding:4px 12px;border-radius:99px}

  .bbar{position:fixed;bottom:0;left:0;right:0;background:var(--header);backdrop-filter:blur(12px);border-top:1px solid var(--line);z-index:40}
  .bb-wrap{max-width:720px;margin:0 auto;padding:14px 24px;display:flex;justify-content:space-between;gap:10px;align-items:center}
  .bb-wrap .pos{font-size:12.5px;color:var(--muted);font-weight:600}
  .bb-wrap .grp{display:flex;gap:10px}

  .done-view{text-align:center;padding-top:40px}
  .done-view .big{font-size:52px;margin-bottom:10px}
  .done-view h2{font-size:26px;margin-bottom:12px}
  .done-view p{color:var(--muted);max-width:460px;margin:0 auto 30px}
  .done-view .grp{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}

  /* test result */
  .score-hero{text-align:center;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:34px 24px;margin-bottom:20px}
  .score-hero .sc{font-size:46px;font-weight:800;color:var(--accent)}
  .score-hero .sub{color:var(--muted);font-size:13.5px;margin-top:4px}
  .tsrow{display:flex;align-items:center;gap:12px;margin-bottom:10px;font-size:13.5px}
  .tsrow .n{width:120px;color:var(--muted);flex-shrink:0}
  .tsrow .bar{flex:1;height:8px;background:var(--surface2);border-radius:99px;overflow:hidden}
  .tsrow .bar i{display:block;height:100%;border-radius:99px;background:var(--accent)}
  .tsrow .pct{width:52px;text-align:right;font-weight:700}
  .rev{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:18px 20px;margin-bottom:12px}
  .rev .rq{font-size:14px;font-weight:700;margin-bottom:8px}
  .rev .ra{font-size:13.5px;margin-bottom:4px}
  .rev .ra.ok{color:var(--ok)} .rev .ra.no{color:var(--no)}
  .rev details{margin-top:8px;font-size:13.5px}
  .rev summary{cursor:pointer;color:var(--muted);font-weight:600}

  .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--line);color:var(--text);padding:11px 20px;border-radius:10px;font-size:13.5px;z-index:99;animation:fadein .25s ease}

  /* 데이터 백업 모달 */
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:90;display:flex;align-items:center;justify-content:center;animation:fadein .2s ease}
  .modal{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:26px;max-width:420px;width:calc(100% - 48px)}
  .modal h3{font-size:17px;font-weight:800;margin-bottom:6px}
  .modal .msub{font-size:13px;color:var(--muted);margin-bottom:18px}
  .modal .mrow{display:flex;flex-direction:column;gap:10px}
  .modal .btn{width:100%;text-align:center}
  .modal .btn-danger{background:transparent;color:var(--no);border:1px solid var(--no-line);padding:12px 20px;font-size:14px}
  .modal .btn-danger:hover{background:var(--no-soft)}
  .modal .mclose{margin-top:14px;text-align:center}
  .modal .mclose button{background:none;border:0;color:var(--muted);font:inherit;font-size:13px;cursor:pointer}
  footer{border-top:1px solid var(--line);margin-top:40px}
  footer .wrap{padding:28px 24px;font-size:12px;color:var(--dim);display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px}
  @media(max-width:640px){ nav{display:none} .hero{padding:40px 0 30px} }
  /* 가이드 원문 토글 */
  .gsrc{margin:28px 0 0;border:1px dashed var(--accent-line);border-radius:12px;background:var(--surface)}
  .gsrc summary{cursor:pointer;padding:13px 18px;font-size:13.5px;font-weight:700;color:var(--accent);list-style:none;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .gsrc summary::-webkit-details-marker{display:none}
  .gsrc summary::before{content:"▸";transition:transform .15s}
  .gsrc[open] summary::before{transform:rotate(90deg)}
  .gsrc .gs-n{font-weight:600;font-size:12px;color:var(--muted);margin-left:auto}
  .gs-body{padding:2px 20px 18px;border-top:1px solid var(--line)}
  .gs-note{font-size:12.5px;color:var(--muted);background:var(--surface2);border-radius:8px;padding:10px 12px;margin:14px 0 4px}
  .gs-ti{font-size:13px;font-weight:700;margin-top:12px;color:var(--text)}
  .gs-body h5{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);margin:16px 0 6px}
  .gs-body ul{margin:0;padding-left:18px}
  .gs-body li{font-size:13px;color:var(--text);margin:6px 0;line-height:1.55}
</style>
</head>
<body>

<header>
  <div class="hwrap">
    <div class="logo" onclick="go('home')">CCA-F <em>ACADEMY</em></div>
    <nav>
      <button class="on" data-tab="home" onclick="go('home')">홈</button>
      <button data-tab="course" onclick="go('home','#parts')">강의</button>
      <button onclick="toast('문제은행은 파트별 미니테스트 + 시나리오 실전(Part 6)으로 통합했어')">문제은행</button>
      <button onclick="openPart('p7')">모의고사</button>
      <button onclick="renderAppendix()">부록</button>
    </nav>
    <div class="hright">
      <button class="theme-btn" onclick="openDataModal()" title="학습 기록 백업·복원">💾</button>
      <button class="theme-btn" id="themeBtn" onclick="toggleTheme()" title="라이트/다크 전환">🌙</button>
      <div class="dday" id="dday">D-?</div>
    </div>
  </div>
</header>

<main id="view"></main>

<footer>
  <div class="wrap">
    <span>CCA-F ACADEMY — 공식 가이드 V2 기반 학습 코스</span>
    <span>EXAM 2026.07.29 · CLAUDE CERTIFIED ARCHITECT – FOUNDATIONS</span>
  </div>
</footer>

<script>window.CCAF_CONTENT = {};</script>
<script src="content/part0.js"></script>
<script src="content/part1.js"></script>
<script src="content/part1-test.js"></script>
<script src="content/part2.js"></script>
<script src="content/part3.js"></script>
<script src="content/part4.js"></script>
<script src="content/part5.js"></script>
<script src="content/part6.js"></script>
<script src="content/exam-bank.js"></script>
<script src="content/appendix.js"></script>
<script src="content/guide-src.js"></script>
<script>
/* ================= parts meta ================= */
const PARTS = [
  {key:"p0", no:"00", en:"Orientation", ko:"시험을 해부한다", time:"30분", weight:"—", prev:null, planned:4},
  {key:"p1", no:"01", en:"Agentic Architecture", ko:"에이전트 아키텍처 & 오케스트레이션", time:"2시간", weight:"27%", prev:{v:"60%",cls:"weak"}, planned:8},

/* ================= storage ================= */
const store = {
  get(){ try{return JSON.parse(localStorage.getItem("ccaf_data")||"{}")}catch(e){return{}} },
  set(d){ localStorage.setItem("ccaf_data", JSON.stringify(d)) },
  lesson(id){ const s=this.get(); return (s.lessons||{})[id] || {step:0, done:false, answers:{}} },
  saveLesson(id, ls){ const s=this.get(); s.lessons=s.lessons||{}; s.lessons[id]=ls; this.set(s); },
  test(id){ const s=this.get(); return (s.tests||{})[id] || null },
  saveTest(id, r){ const s=this.get(); s.tests=s.tests||{}; s.tests[id]=r; this.set(s); },
  addLog(entry){ const s=this.get(); s.log=s.log||[]; s.log.push(entry); this.set(s); }
};
function accuracy(){
  const s = store.get(); let right=0, total=0;
  Object.values(s.lessons||{}).forEach(ls=>Object.values(ls.answers||{}).forEach(a=>{
    if(a.outcome){ total++; if(a.outcome==="right") right++; }
  }));
  return {right, total};
}
function partProgress(key){
  const part = C[key]; if(!part) return {done:0,total:PARTS.find(p=>p.key===key).planned};
  let done = 0;
  part.lessons.forEach(L=>{
    if(L.type==="test" || L.type==="exam"){ if(store.test(L.id)) done++; }
    else if(store.lesson(L.id).done) done++;
  });
  return {done, total: part.lessons.length};
}
function doneUnits(){ return PARTS.reduce((a,p)=>a+partProgress(p.key).done,0); }

/* ===== 보기 셔플 =====
   레슨 연습문제: attemptSalt=0 → 문항별 결정적 순서 (저장된 O/X 복원 안전)
   미니테스트·모의고사: 응시 시작마다 attemptSalt 갱신 → 보기 순서가 매번 무작위 */
let attemptSalt = 0;
function qHash(s){ let h=0; for(let i=0;i<s.length;i++){ h=(h*31 + s.charCodeAt(i))|0; } return Math.abs(h)||1; }
function qPerm(q){
  const n = q.opts.length, idx = [...Array(n).keys()];
  let seed = ((qHash((q.q||"") + (q.h||"")) ^ attemptSalt) & 0x7fffffff) || 1;
  for(let i=n-1;i>0;i--){ seed = (Math.imul(seed, 1103515245) + 12345) & 0x7fffffff; const j = (seed >>> 8) % (i+1); [idx[i],idx[j]]=[idx[j],idx[i]]; }
  return idx;
}
function displayOpts(q){
  const perm = qPerm(q);
  const wrongMap = {}; let w = 0;
  q.opts.forEach((o,i)=>{ if(!o.ok) wrongMap[i] = (q.explain?.wrongs||[])[w++]; });
  return perm.map((orig,p)=>({ t:q.opts[orig].t, ok:!!q.opts[orig].ok, wrongText:wrongMap[orig], letter:"ABCD"[p] }));
}
function relabel(text, letter){ return text ? text.replace(/^(<b>)[A-D]/, "$1"+letter) : text; }
function dispWrongs(q){ return displayOpts(q).filter(o=>!o.ok).map(o=>relabel(o.wrongText||"", o.letter)); }
function dispOkIdx(q){ return displayOpts(q).findIndex(o=>o.ok); }

/* 다음 학습 지점 찾기 */
function nextUp(){
  for(const p of PARTS){
    const part = C[p.key]; if(!part) continue;
    for(let i=0;i<part.lessons.length;i++){
      const L = part.lessons[i];
      if(L.type==="test" || L.type==="exam"){ if(!store.test(L.id)) return {pk:p.key, idx:i, L, meta:p}; }
      else if(!store.lesson(L.id).done) return {pk:p.key, idx:i, L, meta:p};
    }
  }
  return null;
}

/* ================= lesson runner ================= */
let ctx = null; /* {pk, idx, L} */
let cur = 0, quizState = {};

function openLesson(pk, idx){
  attemptSalt = 0; /* 레슨은 결정적 셔플 — 저장된 답 복원 위해 */
  const L = C[pk].lessons[idx];
  ctx = {pk, idx, L};
  const saved = store.lesson(L.id);
  quizState = saved.answers || {};
  cur = saved.done ? 0 : Math.min(saved.step||0, L.steps.length-1);
  renderStep();
}
function persist(){
  const L = ctx.L; const saved = store.lesson(L.id);
  store.saveLesson(L.id, {
    step: cur >= L.steps.length ? L.steps.length-1 : cur,
    done: saved.done || cur >= L.steps.length,
    answers: quizState
  });
}
function segs(){
  return `<div class="segs">${ctx.L.steps.map((_,i)=>`<i class="${i<cur?"done":i===cur?"now":""}"></i>`).join("")}</div>`;
}

}

  const DOMNAMES = {D1:"D1 에이전트 아키텍처",D2:"D2 도구·MCP",D3:"D3 Claude Code",D4:"D4 프롬프트·구조화",D5:"D5 컨텍스트·신뢰성"};
  view.innerHTML = `
  <div class="ppage">
    <button class="crumb" onclick="openPart('p7')">← 파이널로</button>
    <div class="score-hero">
      <div class="eyebrow">SCORE REPORT${EX.timedOut? " · ⏱ 시간 종료 자동 제출":""}</div>
      <div class="sc" style="color:${pass? "var(--ok)":"var(--no)"}">${scaled}</div>
      <div class="sub" style="font-weight:800;font-size:16px;color:${pass? "var(--ok)":"var(--no)"}">${pass? "Passed ✓":"Did Not Pass"}</div>
      <div class="sub">추정 스케일 점수 (100–1000 근사 환산) · 합격선 720 · 정답 ${right}/${total} (${Math.round(right/total*100)}%)</div>
    </div>
    <h2 style="font-size:17px;margin:26px 0 14px">Performance by domain</h2>
    ${Object.entries(dom).sort().map(([d,v])=>{
      const pct = Math.round(v.r/v.t*100);
      return `<div class="tsrow"><span class="n" style="width:170px">${DOMNAMES[d]||d}${pct<75? ` <span style="color:var(--no);font-size:11px;font-weight:800">focus here</span>`:""}</span><div class="bar"><i style="width:${pct}%;background:${pct<75? "var(--no)":"var(--ok)"}"></i></div><span class="pct">${v.r}/${v.t}</span></div>`;}).join("")}
    <h2 style="font-size:17px;margin:26px 0 14px">시나리오별 정답률</h2>
    ${Object.entries(scn).map(([s,v])=>`
      <div class="tsrow"><span class="n" style="width:170px">${window.CCAF_SCENARIOS[s].no} ${window.CCAF_SCENARIOS[s].name}</span><div class="bar"><i style="width:${Math.round(v.r/v.t*100)}%"></i></div><span class="pct">${v.r}/${v.t}</span></div>`).join("")}
    <h2 style="font-size:17px;margin:30px 0 14px">전 문항 해설 (오답은 펼쳐져 있어)</h2>
    ${EX.flat.map((item,i)=>{
      const q = item.q, my = EX.answers[i];
      const dop = displayOpts(q);
      const ok = dop[my]?.ok; const okIdx = dispOkIdx(q);
      return `<div class="rev">
        <div class="rq">Q${i+1} <span class="muted" style="font-weight:600">· ${window.CCAF_SCENARIOS[item.sc].no} · ${q.ts||""}</span> — ${q.q}</div>
        <div class="ra ${ok? "ok":"no"}">내 답: ${my===null? "미응답 (시간 종료)": "ABCD"[my]} ${ok? "✓":"✕"}</div>
        ${ok? "":`<div class="ra ok">정답: ${"ABCD"[okIdx]} — ${dop[okIdx].t}</div>`}
        <details ${ok? "":"open"}><summary>해설</summary>
          <p style="margin-top:8px">${q.explain.good}</p>
          <ul style="list-style:none;margin-top:8px">${dispWrongs(q).map(w=>`<li style="padding-left:20px;position:relative;margin-bottom:6px"><span style="position:absolute;left:0;color:var(--no)">✕</span>${w}</li>`).join("")}</ul>
          ${q.principle? `<span class="chip">🏷 ${q.principle}</span>`:""}
        </details>
      </div>`;}).join("")}
    <div style="margin-top:24px;display:flex;gap:10px">
      <button class="btn btn-primary" onclick="openExam()">다시 응시 (새 시나리오 조합)</button>
      <button class="btn btn-ghost" onclick="go('home')">홈으로</button>
    </div>
  </div>`;
  window.scrollTo(0,0);
}

/* ================= 데이터 백업·복원 ================= */
function openDataModal(){
  const acc = accuracy(); const du = doneUnits();
  const bg = document.createElement("div");
  bg.className = "modal-bg";
  bg.onclick = e => { if(e.target===bg) bg.remove(); };
  bg.innerHTML = `<div class="modal">
    <h3>💾 학습 기록</h3>
    <div class="msub">완료 레슨 ${du}개 · 문항 기록 ${acc.total}개 (정답 ${acc.right})<br>
    기록은 이 브라우저에 자동 저장돼. 다른 컴퓨터·브라우저로 옮기거나 만약을 대비하려면 파일로 내보내둬.</div>
    <div class="mrow">
      <button class="btn btn-primary" onclick="exportData()">기록 내보내기 (.json 파일 저장)</button>
      <button class="btn btn-ghost" onclick="document.getElementById('importFile').click()">기록 가져오기 (파일 선택)</button>
      <button class="btn btn-danger" onclick="resetData()">기록 전체 초기화</button>
    </div>
    <input type="file" id="importFile" accept=".json,application/json" style="display:none" onchange="importData(this)">
    <div class="mclose"><button onclick="this.closest('.modal-bg').remove()">닫기</button></div>
  </div>`;
  document.body.appendChild(bg);
}
function exportData(){
  const payload = {
    app: "ccaf-academy", version: 1, exported: new Date().toISOString(),
    data: store.get(), theme: localStorage.getItem("ccaf_theme") || "dark"
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `ccaf-record-${new Date().toISOString().slice(0,10)}.json`;
  a.click(); URL.revokeObjectURL(a.href);
  toast("기록 파일을 저장했어. 안전한 곳에 보관해둬.");
}
function importData(input){
  const file = input.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try{
      const payload = JSON.parse(reader.result);
      const d = payload.app==="ccaf-academy" ? payload.data : payload; /* 구버전 파일 호환 */
      if(!d || (typeof d !== "object") || (!d.lessons && !d.log && !d.tests)) throw new Error("형식 불일치");
      if(!confirm("가져온 기록으로 현재 기록을 덮어쓸까? (현재 기록은 사라져)")) return;
      store.set(d);
      if(payload.theme){ localStorage.setItem("ccaf_theme", payload.theme); document.documentElement.dataset.theme = payload.theme; applyThemeIcon(); }
      document.querySelector(".modal-bg")?.remove();
      renderHome();
      toast("기록을 복원했어. 이어서 학습하면 돼.");
    }catch(e){ toast("이 파일은 학습 기록 파일이 아닌 것 같아."); }
  };
  reader.readAsText(file);
}
function resetData(){
  if(!confirm("정말 모든 진도·문항 기록을 지울까?")) return;
  if(!confirm("한 번 더 확인할게 — 되돌릴 수 없어. 내보내기로 백업은 해뒀어?")) return;
  localStorage.removeItem("ccaf_data");
  document.querySelector(".modal-bg")?.remove();
  renderHome();
  toast("기록을 초기화했어.");
}

/* ================= 부록 ================= */
function renderAppendix(filter){
  const A = window.CCAF_APPENDIX;
  const f = (filter||"").toLowerCase();
  const items = A.glossary.filter(g => !f || (g.t+g.d+g.c).toLowerCase().includes(f));
  const cats = [...new Set(items.map(g=>g.c))];
  view.innerHTML = `
  <div class="ppage">
    <button class="crumb" onclick="go('home')">← 홈</button>
    <div class="phead">
      <div class="eyebrow">APPENDIX</div>
      <h1>부록 — 치트시트 · 판단 도구 · 용어사전</h1>
      <div class="pdesc">시험 전날은 이 페이지 + 오답 기록만. 새 내용 금지.</div>
    </div>
    <div class="prose">
      <h2 style="font-size:19px;margin:10px 0 6px">🗂 핵심 치트시트</h2>
      ${A.cheat}
      <h2 style="font-size:19px;margin:34px 0 6px">⚖️ 판단 원칙 5</h2>
      ${A.principles}
      <h2 style="font-size:19px;margin:34px 0 10px">📖 용어사전 (${A.glossary.length})</h2>
      <input id="glosFilter" placeholder="용어 검색... (예: 훅, batch, 글롭)" value="${filter||""}"
        style="width:100%;padding:11px 14px;border-radius:10px;border:1px solid var(--line);background:var(--surface);color:var(--text);font:inherit;font-size:14px;margin-bottom:16px"
        oninput="renderAppendixFilter(this.value)">
      <div id="glosList">
      ${cats.map(c=>`
        <h4 style="margin-top:18px">${c}</h4>
        ${items.filter(g=>g.c===c).map(g=>`
          <div style="border:1px solid var(--line);border-radius:10px;padding:12px 16px;margin-bottom:8px;background:var(--surface)">
            <b>${g.t}</b><br><span class="muted" style="font-size:13.5px">${g.d}</span>
          </div>`).join("")}`).join("")}
      ${items.length? "" : `<p class="muted">검색 결과 없음</p>`}
      </div>
    </div>
  </div>`;
  if(filter !== undefined){
    const inp = document.getElementById("glosFilter");
    inp.focus(); inp.setSelectionRange(inp.value.length, inp.value.length);
  } else window.scrollTo(0,0);
}
function renderAppendixFilter(v){
  const A = window.CCAF_APPENDIX;
  const f = v.toLowerCase();
  const items = A.glossary.filter(g => !f || (g.t+g.d+g.c).toLowerCase().includes(f));
  const cats = [...new Set(items.map(g=>g.c))];
  document.getElementById("glosList").innerHTML = cats.map(c=>`
    <h4 style="margin-top:18px">${c}</h4>
    ${items.filter(g=>g.c===c).map(g=>`
      <div style="border:1px solid var(--line);border-radius:10px;padding:12px 16px;margin-bottom:8px;background:var(--surface)">
        <b>${g.t}</b><br><span class="muted" style="font-size:13.5px">${g.d}</span>
      </div>`).join("")}`).join("") || `<p class="muted">검색 결과 없음</p>`;
}

/* ================= toast / init ================= */
let toastTimer;
function toast(msg){
  document.querySelector(".toast")?.remove();
  const t = document.createElement("div"); t.className="toast"; t.textContent=msg;
  document.body.appendChild(t);
  clearTimeout(toastTimer); toastTimer = setTimeout(()=>t.remove(), 2600);
}
applyThemeIcon();
renderHome();
</script>
</body>
</html>
